{% extends "base.html" %}
{% block title %}Server Error – Student Hub{% endblock %}
{% block body_class %}{% endblock %}
{% block content %}
<div class="min-h-[calc(100vh-64px)] flex flex-col items-center justify-center px-margin-mobile text-center">
  <span class="material-symbols-outlined text-[80px] text-outline mb-lg">cloud_off</span>
  <h1 class="text-h1 font-h1 text-primary mb-xs">500</h1>
  <h2 class="text-h3 font-h3 text-on-surface mb-md">Something went wrong</h2>
  <p class="text-body-md font-body-md text-on-surface-variant max-w-xs mb-xl">An unexpected error occurred. Please try again in a moment.</p>
  <a href="{{ url_for('index') }}" class="h-[52px] px-xl bg-primary text-on-primary rounded-xl font-label-md text-label-md shadow-lg hover:shadow-xl hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center gap-xs">
    Go Home <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
  </a>
</div>
{% endblock %}
